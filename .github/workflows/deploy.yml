name: Deploy login app (hal-citas-login)

on:
  push:
    branches: [main]
  # Corre los tests en pull requests para frenar regresiones antes del merge.
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-login
  cancel-in-progress: false

env:
  # Ruta del dominio relativa al home (acceso SFTP-only)
  REMOTE_DOMAIN_DIR: web/citas.hospitalantoniolorena.gob.pe
  # La API vive en el mismo origen, bajo /api
  NEXT_PUBLIC_API_BASE: /api
  # Portal de login SSO (hal-auth). Sin esto, el build cae a localhost:3005.
  NEXT_PUBLIC_AUTH_URL: https://auth.hospitalantoniolorena.gob.pe

jobs:
  # Ejecuta los tests (con umbral de cobertura 100%) antes de desplegar.
  # El job de deploy depende de este, asi un test fallido bloquea el deploy.
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Instalar dependencias
        run: npm ci

      - name: Ejecutar tests con cobertura
        run: npm run test:coverage

  deploy:
    needs: test
    # Solo despliega en push a main / ejecucion manual, nunca en pull requests.
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Instalar dependencias
        run: npm ci

      - name: Construir (exportación estática)
        run: npm run build

      - name: Preparar artefacto (zip + extractor)
        run: |
          set -euo pipefail
          ( cd out && zip -qr "$GITHUB_WORKSPACE/site.zip" . )
          TOKEN="$(openssl rand -hex 16)"
          echo "::add-mask::$TOKEN"
          echo "UNPACK_TOKEN=$TOKEN" >> "$GITHUB_ENV"
          sed "s/__UNPACK_TOKEN__/$TOKEN/" deploy/unpack.php > unpack.php
          ls -lh site.zip unpack.php

      - name: Configurar clave SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy

      - name: Subir artefacto por SFTP
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
        run: |
          set -euo pipefail
          sftp -i "$HOME/.ssh/id_deploy" -P "$DEPLOY_PORT" \
            -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
            -b - "$DEPLOY_USER@$DEPLOY_HOST" <<EOF
          -mkdir $REMOTE_DOMAIN_DIR/public_html
          put site.zip $REMOTE_DOMAIN_DIR/public_html/site.zip
          put unpack.php $REMOTE_DOMAIN_DIR/public_html/unpack.php
          EOF

      - name: Extraer en el servidor (PHP) y verificar
        run: |
          set -euo pipefail
          BASE="https://citas.hospitalantoniolorena.gob.pe"
          echo "Extrayendo site.zip..."
          curl -k -fsS "$BASE/unpack.php?token=$UNPACK_TOKEN"; echo
          echo "Verificando assets referenciados por el HTML..."
          html="$(curl -k -fsSL "$BASE/")"
          echo "$html" | grep -oE '/_next/static/[^"]+\.(js|css)' | sort -u | while read -r p; do
            code="$(curl -k -s -o /dev/null -w '%{http_code}' "$BASE$p")"
            echo "$code $p"
            [ "$code" = "200" ] || { echo "FALTA $p"; exit 1; }
          done
          echo "✅ Deploy verificado"
