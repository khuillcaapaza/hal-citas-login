name: Deploy login app (hal-citas-login)

on:
  push:
    branches: [main]
  # Corre los tests en pull requests para frenar regresiones antes del merge.
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-login
  cancel-in-progress: false

env:
  # Ruta del dominio relativa al home (acceso SFTP-only)
  REMOTE_DOMAIN_DIR: web/citas.hospitalantoniolorena.gob.pe
  # La API vive en el mismo origen, bajo /api
  NEXT_PUBLIC_API_BASE: /api

jobs:
  # Ejecuta los tests (con umbral de cobertura 100%) antes de desplegar.
  # El job de deploy depende de este, asi un test fallido bloquea el deploy.
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Instalar dependencias
        run: npm ci

      - name: Ejecutar tests con cobertura
        run: npm run test:coverage

  deploy:
    needs: test
    # Solo despliega en push a main / ejecucion manual, nunca en pull requests.
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Instalar dependencias
        run: npm ci

      - name: Construir (exportación estática)
        run: npm run build

      - name: Instalar lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: Configurar clave SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy

      - name: Desplegar out/ por SFTP (preserva /api)
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
        run: |
          KEY="$HOME/.ssh/id_deploy"
          SSH="ssh -a -x -i $KEY -p $DEPLOY_PORT -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"
          lftp -e "
            set sftp:connect-program '$SSH';
            set sftp:auto-confirm yes;
            set net:max-retries 5;
            set net:persist-retries 10;
            set net:timeout 30;
            set xfer:clobber on;
            set mirror:parallel-transfer-count 1;
            open -u $DEPLOY_USER, sftp://$DEPLOY_HOST;
            mkdir -p -f $REMOTE_DOMAIN_DIR/public_html;
            mirror -R --delete --no-perms --ignore-time --verbose --exclude api/ ./out/ $REMOTE_DOMAIN_DIR/public_html;
            bye
          "
