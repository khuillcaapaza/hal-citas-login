<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Acceso · Sistema de Citas</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="card" id="app">
    <!-- Vista de login -->
    <section id="vista-login">
      <h1 class="titulo">Sistema de Citas</h1>
      <p class="subtitulo">Hospital Antonio Lorena</p>

      <form id="form-login" autocomplete="off" novalidate>
        <label class="campo">
          <span>Usuario</span>
          <input type="text" id="usuario" name="usuario" required autofocus />
        </label>

        <label class="campo">
          <span>Contraseña</span>
          <input type="password" id="password" name="password" required />
        </label>

        <button type="submit" id="btn-entrar" class="boton">Entrar</button>
        <p id="mensaje" class="mensaje" role="alert" aria-live="polite"></p>
      </form>
    </section>

    <!-- Vista autenticada -->
    <section id="vista-panel" hidden>
      <h1 class="titulo">Bienvenido</h1>
      <p class="bienvenida">
        Hola, <strong id="panel-nombre"></strong>
        (<span id="panel-rol"></span>)
      </p>
      <p class="subtitulo">Sesión iniciada correctamente. Conexión con la API verificada.</p>
      <button type="button" id="btn-salir" class="boton boton--secundario">Cerrar sesión</button>
    </section>
  </main>

  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
